name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ruff + mypy + pytest (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dev environment (frozen against uv.lock)
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check lib tests viewer

      - name: Type check (mypy)
        run: uv run mypy lib tests

      - name: Test (pytest)
        run: uv run pytest -q
